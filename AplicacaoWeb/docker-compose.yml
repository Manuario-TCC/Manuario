services:
  mongo_db:
    image: mongo:latest
    container_name: mongo_manuario
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - web_network
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017"]

  socket_server:
    build: ./socket_server
    container_name: socket_manuario
    restart: always
    ports:
      - "3001:3001"
    networks:
      - web_network

volumes:
  mongo-data:
    external: true
    name: ia_mongo-data
    
networks:
  web_network:
    driver: bridge
    