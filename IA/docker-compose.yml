# IA/docker-compose.yml
services:
  # O Cérebro (n8n)
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=America/Sao_Paulo
    depends_on:
      - redis_memory
      - ollama # Garante que o Ollama inicie antes do n8n
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - ia_network

  # A Memória Antiga (Mantida para o n8n)
  redis_memory:
    image: redis:alpine
    container_name: redis_memory
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - ia_network

  # Postgres com PGVector já instalado
  rag-postgres:
    image: pgvector/pgvector:pg16
    container_name: rag_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123 
      POSTGRES_DB: vector_db
    ports:
      - "5434:5432"
    volumes:
      - rag_postgres_data:/var/lib/postgresql/data
    networks:
      - ia_network

  # Interface de Administração para o Banco Vetorial
  rag-pgadmin:
    image: dpage/pgadmin4
    container_name: rag_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin 
    ports:
      - "5050:80"
    depends_on:
      - rag-postgres
    volumes:
      - rag_pgadmin_data:/var/lib/pgadmin
    networks:
      - ia_network

  # Motor de Embeddings Local (Ollama)
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - ia_network

volumes:
  n8n_data:
  redis_data:
  rag_postgres_data:
  rag_pgadmin_data:
  ollama_data: # Volume novo para guardar os modelos do Ollama

networks:
  ia_network: # Rede fechada apenas para a IA
    driver: bridge